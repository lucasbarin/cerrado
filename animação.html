<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Árvore SVG com máscara</title>
  <style>
    :root{
      --bg:#111;
      --tree:#fff;
      --cycle:5.5s;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:var(--bg);
      font-family:Arial,sans-serif;
    }

    .wrap{
      width:min(420px,70vw);
      aspect-ratio:132.6 / 164.1;
    }

    svg{
      width:100%;
      height:auto;
      display:block;
      overflow:visible;
    }

    .tree-part{
      fill:var(--tree);
    }

    /* Máscara do tronco: sobe de baixo para cima */
    .mask-trunk-rect{
      animation: revealTrunk var(--cycle) ease-out infinite;
      transform-origin:center bottom;
    }

    /* Máscara dos galhos: abre depois, com sensação lateral */
    .mask-branches-rect{
      animation: revealBranches var(--cycle) ease-out infinite;
      transform-origin:center center;
    }

    /* Folhas / frutos */
    .bloom{
      transform-box:fill-box;
      transform-origin:center center;
      opacity:0;
      animation:bloomGrow var(--cycle) ease-in-out infinite;
    }

    .b1 { animation-delay: 0s; }
    .b2 { animation-delay: 0.08s; }
    .b3 { animation-delay: 0.16s; }
    .b4 { animation-delay: 0.24s; }
    .b5 { animation-delay: 0.32s; }
    .b6 { animation-delay: 0.40s; }
    .b7 { animation-delay: 0.48s; }
    .b8 { animation-delay: 0.56s; }
    .b9 { animation-delay: 0.64s; }

    @keyframes revealTrunk {
      0% {
        y: 164.1px;
        height: 0px;
      }

      10% {
        y: 40px;
        height: 124.1px;
      }

      78% {
        y: 40px;
        height: 124.1px;
      }

      90.9% {
        y: 164.1px;
        height: 0px;
      }

      100% {
        y: 164.1px;
        height: 0px;
      }
    }

    @keyframes revealBranches {
      0% {
        x: 66.3px;
        width: 0px;
        y: 0px;
        height: 130px;
      }

      10% {
        x: 66.3px;
        width: 0px;
        y: 0px;
        height: 130px;
      }

      24% {
        x: 8px;
        width: 116.6px;
        y: 0px;
        height: 130px;
      }

      74% {
        x: 8px;
        width: 116.6px;
        y: 0px;
        height: 130px;
      }

      84% {
        x: 66.3px;
        width: 0px;
        y: 0px;
        height: 130px;
      }

      100% {
        x: 66.3px;
        width: 0px;
        y: 0px;
        height: 130px;
      }
    }

    @keyframes bloomGrow {
      0% {
        opacity: 0;
        transform: scale(0.2);
      }

      20% {
        opacity: 0;
        transform: scale(0.2);
      }

      36.36% {
        opacity: 1;
        transform: scale(1);
      }

      70% {
        opacity: 1;
        transform: scale(1);
      }

      82% {
        opacity: 0;
        transform: scale(0.2);
      }

      100% {
        opacity: 0;
        transform: scale(0.2);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 132.6 164.1" xmlns="http://www.w3.org/2000/svg" aria-label="Árvore animada">
      <defs>
        <!-- Máscara do tronco -->
        <mask id="maskTrunk" maskUnits="userSpaceOnUse">
          <rect x="0" y="0" width="132.6" height="164.1" fill="black"/>
          <rect class="mask-trunk-rect" x="0" y="164.1" width="132.6" height="0" fill="white"/>
        </mask>

        <!-- Máscara dos galhos laterais -->
        <mask id="maskBranches" maskUnits="userSpaceOnUse">
          <rect x="0" y="0" width="132.6" height="164.1" fill="black"/>
          <rect class="mask-branches-rect" x="66.3" y="0" width="0" height="130" fill="white"/>
        </mask>
      </defs>

      <!-- Tronco central -->
      <g mask="url(#maskTrunk)">
        <path class="tree-part" d="M84.3,64.7c.6-.6.5-1.4-.3-1.8l-2-.9c-.8-.4-2-.2-2.8.3l-6.7,5.1c-.7.5-1.3.2-1.3-.6v-25.1c0-.9-.8-1.6-1.6-1.6h-5.8c-.9,0-1.6.7-1.7,1.6l-1.9,71.9c0,.9-.6,1.1-1.2.5l-18.7-16.8c-.7-.6-1.9-.8-2.7-.4l-2.6,1.1c-.8.4-1,1.2-.4,1.8l25.1,27c.6.6,1.1,1.9,1.1,2.8l-.4,33c0,.9.7,1.6,1.6,1.6h9.3c.9,0,1.6-.7,1.6-1.6l-1.4-83.3c0-.9.5-2.1,1.1-2.8l11.7-11.8Z"/>
      </g>

      <!-- Parte superior/lateral do tronco, galhos -->
      <g mask="url(#maskBranches)">
        <path class="tree-part" d="M84.3,64.7c.6-.6.5-1.4-.3-1.8l-2-.9c-.8-.4-2-.2-2.8.3l-6.7,5.1c-.7.5-1.3.2-1.3-.6v-25.1c0-.9-.8-1.6-1.6-1.6h-5.8c-.9,0-1.6.7-1.7,1.6l-1.9,71.9c0,.9-.6,1.1-1.2.5l-18.7-16.8c-.7-.6-1.9-.8-2.7-.4l-2.6,1.1c-.8.4-1,1.2-.4,1.8l25.1,27c.6.6,1.1,1.9,1.1,2.8l-.4,33c0,.9.7,1.6,1.6,1.6h9.3c.9,0,1.6-.7,1.6-1.6l-1.4-83.3c0-.9.5-2.1,1.1-2.8l11.7-11.8Z"/>
      </g>

      <!-- Folhas / frutos -->
      <g class="bloom b1">
        <path class="tree-part" d="M103.6,98.5c0-6.2-5-11.3-11.2-11.3s-11.2,5.1-11.2,11.3,5,11.3,11.2,11.3,11.2-5.1,11.2-11.3Z"/>
      </g>

      <g class="bloom b2">
        <path class="tree-part" d="M35.4,122.1c-6.2,0-11.2,5.1-11.2,11.3s5,11.3,11.2,11.3,11.2-5.1,11.2-11.3-5-11.3-11.2-11.3Z"/>
      </g>

      <g class="bloom b3">
        <path class="tree-part" d="M30.6,73.3c0,6.2,5,11.3,11.2,11.3s11.2-5.1,11.2-11.3-5-11.3-11.2-11.3-11.2,5.1-11.2,11.3Z"/>
      </g>

      <g class="bloom b4">
        <path class="tree-part" d="M122.6,62.3c-.8-.7-2.1-.7-3,0-6.3,5.4-10,12.5-10,20.3s3.8,14.9,10,20.3c.8.7,2.1.7,3,0,6.3-5.4,10-12.5,10-20.3s-3.8-14.9-10-20.3Z"/>
      </g>

      <g class="bloom b5">
        <path class="tree-part" d="M13,70.6c-.8-.7-2.1-.7-3,0-6.3,5.4-10,12.5-10,20.3s3.8,14.9,10,20.3c.8.7,2.1.7,3,0,6.3-5.4,10-12.5,10-20.3s-3.8-14.9-10-20.3Z"/>
      </g>

      <g class="bloom b6">
        <path class="tree-part" d="M16.8,55.5c8.3.6,16-1.8,21.5-7.3,5.5-5.5,7.8-13.2,7.2-21.5,0-1.1-1-2-2.1-2.1-8.3-.6-16,1.8-21.5,7.3-5.5,5.5-7.8,13.2-7.2,21.5,0,1.1,1,2,2.1,2.1Z"/>
      </g>

      <g class="bloom b7">
        <path class="tree-part" d="M81.9,31.4c1.1,0,2-.9,2.1-2.1.8-8.2-1.4-16-6.8-21.6C71.8,2.1,64.1-.4,55.9,0c-1.1,0-2,.9-2.1,2.1-.8,8.2,1.4,16,6.8,21.6,5.4,5.6,13.1,8.1,21.3,7.7Z"/>
      </g>

      <g class="bloom b8">
        <path class="tree-part" d="M114,114.7c-8.3-.4-15.9,2.1-21.3,7.7-5.4,5.6-7.6,13.4-6.9,21.6.1,1.1,1,2,2.1,2.1,8.3.4,15.9-2.1,21.3-7.7,5.4-5.6,7.6-13.4,6.9-21.6-.1-1.1-1-2-2.1-2.1Z"/>
      </g>

      <g class="bloom b9">
        <path class="tree-part" d="M95.3,61.9c8.1-1.8,14.8-6.3,18.5-13.1,3.7-6.9,3.7-14.9.8-22.7-.4-1.1-1.5-1.7-2.6-1.4-8.1,1.8-14.8,6.3-18.5,13.1-3.7,6.9-3.7,14.9-.8,22.7.4,1.1,1.5,1.7,2.6,1.4Z"/>
      </g>
    </svg>
  </div>
</body>
</html>
